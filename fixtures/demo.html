<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Agee Demo Page</title>
    <style>
      body {
        font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 40px auto;
        max-width: 720px;
        padding: 0 20px;
      }
      label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
      }
      input,
      select,
      button {
        font: inherit;
        padding: 10px 12px;
      }
      input {
        width: min(420px, 100%);
      }
      button {
        cursor: pointer;
        margin-left: 8px;
      }
      #results {
        border-top: 1px solid #ddd;
        margin-top: 24px;
        padding-top: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Agee Demo Page</h1>
    <p>Use this page for a low-risk extension smoke test.</p>

    <form id="search-form">
      <label for="query">Search query</label>
      <input id="query" name="query" placeholder="Type something to search" />
      <button type="submit">Search</button>
    </form>

    <p>
      <label for="category">Category</label>
      <select id="category">
        <option>Docs</option>
        <option>Examples</option>
        <option>Research</option>
      </select>
    </p>

    <button id="delete-button" type="button">Delete demo item</button>
    <div id="results">No search yet.</div>

    <script>
      document.getElementById("search-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const query = document.getElementById("query").value || "(empty)";
        const category = document.getElementById("category").value;
        document.getElementById("results").textContent = `Searched ${category}: ${query}`;
      });
      document.getElementById("delete-button").addEventListener("click", () => {
        document.getElementById("results").textContent = "Demo item deleted.";
      });
    </script>
  </body>
</html>
